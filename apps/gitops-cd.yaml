apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: gitops-application
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/kosmolito/gitops-cd.git
    targetRevision: HEAD
    path: ./manifests
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true